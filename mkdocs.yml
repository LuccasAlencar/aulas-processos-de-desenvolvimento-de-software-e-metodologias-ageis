site_name: Processos de Desenvolvimento de Software e Metodologias Ágeis
site_description: Site de aulas e materiais didáticos da matéria "Processos de Desenvolvimento de Software e Metodologias Ágeis"
site_author: Luccas Alencar

# Repositório (substitua pelo seu)
repo_name: LuccasAlencar/aulas-processos-de-desenvolvimento-de-software-e-metodologias-ageis
repo_url: https://github.com/LuccasAlencar/aulas-processos-de-desenvolvimento-de-software-e-metodologias-ageis

# Tema
theme:
  name: material
  language: pt-BR
  palette:
    # Modo claro
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Mudar para modo escuro
    # Modo escuro
    - scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Mudar para modo claro
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - search.suggest
    - search.highlight
    - content.tabs.link
    - content.code.annotation
    - content.code.copy
    - navigation.footer

# Plugins
plugins:
  - search:
      lang: pt

# Extensões Markdown
markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - admonition
  - pymdownx.arithmatex:
      generic: true
  - footnotes
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.mark
  - attr_list
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg

# Navegação
nav:
  - Home: index.md
  - Aulas:
    - Aula 1 - O que são Requisitos de Software?: aulas/aula1.md
    - Aula 2 - Técnicas, Ferramentas e Metodologias no Levantamento de Requisitos: aulas/aula2.md
    - Aula 3 - Tipos de requisitos: aulas/aula3.md
    - Aula 4 - O que é elicitação de requisitos-: aulas/aula4.md
    - Aula 5 - Entrevistas e questionários: aulas/aula5.md
    - Aula 6 - Observação e brainstorming: aulas/aula6.md
    - Aula 7 - O que é o Manifesto Ágil?: aulas/aula7.md
    - Aula 8 - Os 12 princípios ágeis: aulas/aula8.md
    - Aula 9 - Valores ágeis na prática: aulas/aula9.md



extra:
  generator: false